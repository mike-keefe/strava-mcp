name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ask Claude "..."
        2. See error / wrong result
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Which deployment?
      options:
        - Hosted instance
        - Self-hosted
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs from `wrangler tail`, error messages, anything else helpful
